name: Build and publish Android release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'

      - name: Restore release keystore from secrets
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p apps/nexus_mobile/android
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > apps/nexus_mobile/android/release.keystore
          cat > apps/nexus_mobile/android/key.properties <<'EOF'
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=release.keystore
          EOF
        shell: bash

      - name: Install dependencies
        run: flutter pub get
        working-directory: apps/nexus_mobile

      - name: Build release APK
        run: flutter build apk --release --no-shrink
        working-directory: apps/nexus_mobile

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: apps/nexus_mobile/build/app/outputs/flutter-apk/app-release.apk
